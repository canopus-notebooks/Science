<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 3 - Concept 3</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #caf0f8, #e0f7ff);
      color: #1f2937;
      text-align: center;
    }
    header {
      background: linear-gradient(90deg, #0077b6, #0096c7);
      color: white;
      padding: 30px 20px;
    }
    .top-bar { margin: 18px 0 0; }
    .btn {
      display: inline-block;
      background: #0077b6;
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      margin: 4px;
    }
    .btn:hover { background: #023e8a; }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 35px 20px 50px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      margin-top: 30px;
    }

    .card {
      background: white;
      width: 320px;
      border-radius: 18px;
      padding: 24px 20px;
      color: #1f2937;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.18);
    }

    .card.active {
      cursor: pointer;
    }

    .coming {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: #0b3d91;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .card h3 {
      color: #0b3d91;
      margin: 0 0 10px;
    }

    .card p {
      margin: 0;
      line-height: 1.7;
    }

    .open-btn {
      margin-top: 15px;
      display: inline-block;
      background: #0077b6;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

    .open-btn:hover {
      background: #023e8a;
    }
  </style>
</head>
<body>

  <header>
    <h1>Unit 3 - Concept 3</h1>
    <p>Available Sessions</p>
    <div class="top-bar">
      <a class="btn" href="unit3.html">Back to Unit 3</a>
      <a class="btn" href="index.html">Home</a>
    </div>
  </header>

  <div class="container">
    <div class="grid">

      <div class="card active">
        <div class="badge">Session 6</div>
        <h3>Renewable Energy Resources</h3>
        <p>Activities 1 → 5 + Summary</p>
        <a href="u3c3s6.html" class="open-btn">Open Session</a>
      </div>

      <div class="card coming">
        <div class="badge">Session 7</div>
        <h3 style="font-size:30px;color:#ef4444;text-align:center;margin-top:18px;">COMING SOON</h3>
        <p>Lesson 3 + Lesson 4</p>
      </div>

    </div>
  </div>

</body>
</html>
