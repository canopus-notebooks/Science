<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Junior 4 Science | Omar Fathy</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #caf0f8, #e0f7ff);
      text-align: center;
    }

    /* 🔥 MENU BUTTON */
    .menu-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1200;
      background: #0077b6;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 24px;
      cursor: pointer;
    }

    /* 🔥 SIDEBAR */
    .sidebar {
      position: fixed;
      left: -320px;
      top: 0;
      width: 300px;
      height: 100%;
      background: #0077b6;
      color: white;
      padding: 20px;
      transition: 0.3s;
      z-index: 1100;
      overflow-y: auto;
      text-align: left;
    }

    .sidebar.active { left: 0; }

    .tree-toggle {
      width: 100%;
      background: none;
      border: none;
      color: white;
      text-align: left;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .tree-content { display: none; }

    .tree-item.open > .tree-content {
      display: block;
    }

    .tree-link {
      display: block;
      padding: 8px 12px;
      margin: 5px 0;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      text-decoration: none;
      color: white;
    }

    /* 🔥 HERO */
    .hero {
      min-height: 450px;
      background:
        linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.3)),
        url("cover.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
    }

    .hero-content {
      background: rgba(0,0,0,0.3);
      padding: 40px;
      border-radius: 20px;
      color: white;
      max-width: 700px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    /* 🔥 التعديل هنا */
    .hero h2 {
      margin: 25px 0 0;
      font-size: 1.1rem;
    }

    .hero p {
      margin: 28px auto 0;
      line-height: 1.8;
      font-size: 1rem;
    }

    /* 🔥 CONTENT */
    .container {
      padding: 40px 20px;
    }

    .grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 16px;
      text-decoration: none;
      color: black;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }

  </style>
</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">

  <h2>Navigation</h2>

  <!-- Unit 3 -->
  <div class="tree-item">
    <button class="tree-toggle" onclick="toggleTree(this)">Unit 3 ➤</button>
    <div class="tree-content">

      <div class="tree-item">
        <button class="tree-toggle" onclick="toggleTree(this)">Concept 1 ➤</button>
        <div class="tree-content">
          <a class="tree-link" href="u3c1s1.html">Session 1</a>
          <a class="tree-link" href="u3c1s2.html">Session 2</a>
        </div>
      </div>

      <div class="tree-item">
        <button class="tree-toggle" onclick="toggleTree(this)">Concept 2 ➤</button>
        <div class="tree-content">
          <a class="tree-link" href="u3c2s4.html">Session 4</a>
          <a class="tree-link" href="u3c2s5.html">Session 5</a>
        </div>
      </div>

    </div>
  </div>

  <!-- Unit 4 -->
  <div class="tree-item">
    <button class="tree-toggle" onclick="toggleTree(this)">Unit 4 ➤</button>
    <div class="tree-content">
      <a class="tree-link" href="#">Concept 1</a>
    </div>
  </div>

</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Junior 4 Science</h1>
    <h2>Prepared by Omar Fathy</h2>
    <p>
      Welcome to the science sessions website. Choose a unit to open its concepts and available sessions.
    </p>
  </div>
</section>

<!-- CONTENT -->
<div class="container">
  <div class="grid">
    <a class="card" href="unit3.html">
      <h3>Unit 3</h3>
      <p>Concepts and sessions</p>
    </a>

    <a class="card" href="unit4.html">
      <h3>Unit 4</h3>
      <p>Concepts and sessions</p>
    </a>
  </div>
</div>

<script>
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}

function toggleTree(btn) {
  btn.parentElement.classList.toggle("open");
}
</script>

</body>
</html>
