<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session 3</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<header>
  <h1 id="lessonTitle"></h1>
  <p id="lessonInfo"></p>
</header>

<div class="progress">
  <div id="progressBar"></div>
</div>

<div id="slidesContainer"></div>

<div class="toolbar">
  <button onclick="prevSlide()">⬅</button>
  <button onclick="playSlides()">▶</button>
  <button onclick="pauseSlides()">⏸</button>
  <button onclick="nextSlide()">➡</button>
  <button onclick="restartLesson()">🔄</button>
  <button onclick="goHome()">🏠</button>
  <button onclick="toggleFullScreen()">⛶</button>
</div>

<div id="counter"></div>

<script>
const version = Date.now();

const lessonScript = document.createElement("script");
lessonScript.src = "data/u3c2s3.js?v=" + version;

lessonScript.onload = function () {
  const appScript = document.createElement("script");
  appScript.src = "assets/js/script.js?v=" + version;
  document.body.appendChild(appScript);
};

document.body.appendChild(lessonScript);
</script>

</body>
</html>
