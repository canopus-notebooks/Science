<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session 5</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <header>
    <h1 id="lessonTitle"></h1>
    <p id="lessonInfo"></p>
  </header>

  <div class="progress">
    <div id="progressBar"></div>
  </div>

  <div id="slidesContainer"></div>

  <div class="nav">
    <button type="button" onclick="prevSlide()">⬅ Previous Slide</button>
    <button type="button" onclick="nextSlide()">Next Slide ➡</button>
    <button type="button" onclick="toggleFullScreen()">⛶ Full Screen</button>
    <div id="counter"></div>
  </div>

  <script>
    const version = Date.now();

    const lessonScript = document.createElement("script");
    lessonScript.src = "data/u3c2s5.js?v=" + version;

    lessonScript.onload = function () {
      const appScript = document.createElement("script");
      appScript.src = "assets/js/script.js?v=" + version;
      document.body.appendChild(appScript);
    };

    document.body.appendChild(lessonScript);
  </script>

</body>
</html>
